name: Test

on:
  # push:
  workflow_dispatch:
    inputs:
      name:
        description: "Your name"
        required: true
        default: "World"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - run: |
          echo "Linting code..."

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./hello
        with:
          name: ${{ github.event.inputs.name }}

      - run: |
          echo "Hello ${{ github.event.inputs.name }}!"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - run: |
          echo "Building project..."

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: |
          echo "Deploying project..."